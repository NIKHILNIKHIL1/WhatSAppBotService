<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="page(title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:replace="${title}">Page Title</title>
    <link rel="stylesheet" th:href="@{/ui/css/app.css}"/>
</head>
<body>
<header class="app-header">
    <div class="app-header__brand" th:text="${tenantName} ?: 'WhatsAppbotService'">WhatsAppbotService</div>
    <nav class="app-nav">
        <!-- The super admin has no tenant, so tenant-scoped vendor pages would break for them —
             they get only the admin console; vendors never see it. Settings moved there. -->
        <th:block th:unless="${isSuperAdmin}">
            <a th:href="@{/ui/dashboard}">Dashboard</a>
            <a th:href="@{/ui/products}">Products</a>
            <a th:href="@{/ui/categories}">Categories</a>
            <a th:href="@{/ui/inventory}">Inventory</a>
            <a th:href="@{/ui/orders}">Orders</a>
            <a th:href="@{/ui/customers}">Customers</a>
            <a th:href="@{/ui/reports}">Reports</a>
            <a th:href="@{/ui/audit}" th:if="${isVendorAdmin}">Audit</a>
        </th:block>
        <a th:href="@{/ui/admin/tenants}" th:if="${isSuperAdmin}">Tenants</a>
    </nav>
    <div class="app-header__user">
        <span th:text="${currentUserEmail}">user@example.com</span>
        <form th:action="@{/ui/logout}" method="post" class="inline-form">
            <button type="submit" class="link-button">Logout</button>
        </form>
    </div>
</header>
<main class="app-main">
    <div class="flash flash--success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="flash flash--error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <div th:replace="${content}"></div>
</main>
<footer class="app-footer">WhatsAppbotService &mdash; vendor console</footer>
</body>
</html>
