<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Forgot Password - WhatsAppbotService</title>
    <link rel="stylesheet" th:href="@{/ui/css/app.css}"/>
</head>
<body>
<div class="auth-page">
    <h1>Forgot password</h1>
    <p th:if="${onScreenDelivery}">Enter your account email and we&#39;ll show you a one-time reset code on the next screen.</p>
    <p th:unless="${onScreenDelivery}">Enter your account email and we&#39;ll send a one-time reset code to your store&#39;s WhatsApp number.</p>
    <form th:action="@{/ui/forgot-password}" th:object="${forgotPasswordForm}" method="post">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}"/>
            <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>
        <div class="field-error" th:if="${#fields.hasGlobalErrors()}" th:errors="*{global}"></div>
        <button type="submit" class="btn">Send reset code</button>
    </form>
    <div class="auth-links">
        <a th:href="@{/ui/reset-password}">Already have a code?</a>
        <a th:href="@{/ui/login}">Back to login</a>
    </div>
</div>
</body>
</html>
