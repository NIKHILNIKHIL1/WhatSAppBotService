<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: page(~{::title}, ~{::section})}">
<head><title>Order - WhatsAppbotService</title></head>
<body>
<section>
    <div class="toolbar">
        <h1 th:text="'Order ' + ${order.orderNumber}"></h1>
        <span class="badge" th:classappend="'badge--' + ${#strings.toLowerCase(order.status)}"
              th:text="${order.status}"></span>
    </div>

    <div class="card">
        <p><strong>Customer:</strong>
            <span th:text="${order.customerName} ?: ('Customer #' + ${order.customerId})"></span>
            <span th:if="${order.customerPhoneNumber}" th:text="'(' + ${order.customerPhoneNumber} + ')'"></span>
        </p>
        <p><strong>Channel:</strong> <span th:text="${order.channel}"></span></p>
        <p><strong>Subtotal:</strong> <span th:text="${order.subtotalAmount} + ' ' + ${order.currencyCode}"></span></p>
        <p><strong>Total:</strong> <span th:text="${order.totalAmount} + ' ' + ${order.currencyCode}"></span></p>
        <p th:if="${order.notes}"><strong>Notes:</strong> <span th:text="${order.notes}"></span></p>
        <p><strong>Created:</strong> <span th:text="${order.createdAt}"></span></p>
    </div>

    <h2>Items</h2>
    <table>
        <thead>
        <tr>
            <th>Product</th>
            <th>Unit price</th>
            <th>Quantity</th>
            <th>Line total</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${order.items}">
            <td th:text="${item.productNameSnapshot}"></td>
            <td th:text="${item.unitPriceSnapshot}"></td>
            <td th:text="${item.quantity}"></td>
            <td th:text="${item.lineTotal}"></td>
        </tr>
        </tbody>
    </table>

    <div class="card" th:if="${not #lists.isEmpty(allowedNextStatuses)}">
        <h2>Update Status</h2>
        <form th:action="@{/ui/orders/{id}/status(id=${order.id})}" th:object="${statusForm}" method="post">
            <div class="form-group">
                <label for="status">New status</label>
                <select id="status" th:field="*{status}">
                    <option th:each="s : ${allowedNextStatuses}" th:value="${s}" th:text="${s}"></option>
                </select>
            </div>
            <div class="form-group">
                <label for="notes">Notes</label>
                <input type="text" id="notes" th:field="*{notes}"/>
            </div>
            <button type="submit" class="btn">Update</button>
        </form>
    </div>

    <h2>Status History</h2>
    <table th:if="${history.hasContent()}">
        <thead>
        <tr>
            <th>From</th>
            <th>To</th>
            <th>Notes</th>
            <th>When</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="h : ${history.content}">
            <td th:text="${h.fromStatus}"></td>
            <td th:text="${h.toStatus}"></td>
            <td th:text="${h.notes}"></td>
            <td th:text="${h.createdAt}"></td>
        </tr>
        </tbody>
    </table>
    <div class="empty-state" th:unless="${history.hasContent()}">No status changes yet.</div>
</section>
</body>
</html>
