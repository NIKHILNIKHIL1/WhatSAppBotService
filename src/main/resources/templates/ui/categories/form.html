<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: page(~{::title}, ~{::section})}">
<head><title>Category - WhatsAppbotService</title></head>
<body>
<section>
    <h1 th:text="${isEdit} ? 'Edit Category' : 'New Category'"></h1>
    <form th:action="@{${formAction}}" th:object="${categoryForm}" method="post" class="card">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" th:field="*{name}"/>
            <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}"></textarea>
        </div>
        <div class="card" th:if="${not #lists.isEmpty(nonDefaultSupportedLanguages)}">
            <h2>Translations</h2>
            <p>Shown to customers who choose a language other than this store's default. Leave
                blank to fall back to the name/description above.</p>
            <div class="form-group" th:each="lang : ${nonDefaultSupportedLanguages}">
                <label th:for="'nameTranslations-' + ${lang}" th:text="'Name (' + ${lang} + ')'"></label>
                <input type="text" th:id="'nameTranslations-' + ${lang}"
                       th:field="*{nameTranslations[__${lang}__]}"/>
                <label th:for="'descriptionTranslations-' + ${lang}"
                       th:text="'Description (' + ${lang} + ')'"></label>
                <textarea th:id="'descriptionTranslations-' + ${lang}"
                          th:field="*{descriptionTranslations[__${lang}__]}"></textarea>
            </div>
        </div>
        <div class="form-group">
            <label for="parentCategoryId">Parent category</label>
            <select id="parentCategoryId" th:field="*{parentCategoryId}">
                <option value="">None</option>
                <option th:each="c : ${parentCategories}" th:value="${c.id}" th:text="${c.name}"></option>
            </select>
        </div>
        <div class="form-group">
            <label for="displayOrder">Display order</label>
            <input type="number" id="displayOrder" th:field="*{displayOrder}"/>
        </div>
        <div class="form-group" th:if="${isEdit}">
            <label><input type="checkbox" th:field="*{active}"/> Active</label>
        </div>
        <div class="field-error" th:if="${#fields.hasGlobalErrors()}" th:errors="*{global}"></div>
        <button type="submit" class="btn">Save</button>
        <a th:href="@{/ui/categories}" class="btn btn-secondary">Cancel</a>
    </form>
</section>
</body>
</html>
