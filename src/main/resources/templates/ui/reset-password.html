<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Reset Password - WhatsAppbotService</title>
    <link rel="stylesheet" th:href="@{/ui/css/app.css}"/>
</head>
<body>
<div class="auth-page">
    <h1>Reset password</h1>
    <div class="flash flash--success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="flash flash--success" th:if="${onScreenCode}">
        Your reset code: <strong th:text="${onScreenCode}"></strong>
    </div>
    <form th:action="@{/ui/reset-password}" th:object="${resetPasswordForm}" method="post">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}"/>
            <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>
        <div class="form-group">
            <label for="code">Reset code (from WhatsApp)</label>
            <input type="text" id="code" th:field="*{code}" inputmode="numeric" autocomplete="one-time-code"/>
            <div class="field-error" th:if="${#fields.hasErrors('code')}" th:errors="*{code}"></div>
        </div>
        <div class="form-group">
            <label for="newPassword">New password</label>
            <input type="password" id="newPassword" th:field="*{newPassword}"/>
            <div class="field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
        </div>
        <div class="form-group">
            <label for="confirmPassword">Confirm new password</label>
            <input type="password" id="confirmPassword" th:field="*{confirmPassword}"/>
            <div class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
        </div>
        <div class="field-error" th:if="${#fields.hasGlobalErrors()}" th:errors="*{global}"></div>
        <button type="submit" class="btn">Reset password</button>
    </form>
    <div class="auth-links">
        <a th:href="@{/ui/forgot-password}">Request a new code</a>
        <a th:href="@{/ui/login}">Back to login</a>
    </div>
</div>
</body>
</html>
