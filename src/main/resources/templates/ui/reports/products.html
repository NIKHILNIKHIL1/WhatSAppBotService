<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: page(~{::title}, ~{::section})}">
<head><title>Product Performance - WhatsAppbotService</title></head>
<body>
<section>
    <p><a th:href="@{/ui/reports(from=${fromDate},to=${toDate})}">&larr; Back to Reports</a></p>
    <h1>Product Performance</h1>

    <p>
        <a th:href="@{/ui/reports/products}">All time</a> |
        <a th:href="@{/ui/reports/products(from=${today},to=${today})}">Today</a> |
        <a th:href="@{/ui/reports/products(from=${yesterday},to=${yesterday})}">Yesterday</a> |
        <a th:href="@{/ui/reports/products(from=${weekAgo},to=${today})}">Last 7 days</a> |
        <a th:href="@{/ui/reports/products(from=${monthStart},to=${today})}">This month</a>
    </p>
    <form method="get" th:action="@{/ui/reports/products}" class="toolbar">
        <label>From <input type="date" name="from" th:value="${fromDate}"/></label>
        <label>To <input type="date" name="to" th:value="${toDate}"/></label>
        <button type="submit" class="btn">Apply</button>
    </form>

    <p th:if="${dateRange != null}">
        <strong th:text="${#temporals.format(dateRange.from(), 'dd MMM yyyy')}"></strong>
        &ndash;
        <strong th:text="${#temporals.format(dateRange.to(), 'dd MMM yyyy')}"></strong>
        &mdash; top 50 products by revenue
        &ensp;
        <a th:href="@{/ui/reports/products/export(from=${fromDate},to=${toDate})}"
           class="btn btn--outline">&#8595; Export CSV</a>
    </p>

    <table th:if="${products != null and !products.isEmpty()}">
        <thead>
        <tr>
            <th>#</th>
            <th>SKU</th>
            <th>Product</th>
            <th>Category</th>
            <th>Qty Sold</th>
            <th>Orders</th>
            <th>Revenue (<span th:text="${currency}"></span>)</th>
            <th>Current Stock</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p, stat : ${products}">
            <td th:text="${stat.index + 1}"></td>
            <td th:text="${p.sku()}"></td>
            <td th:text="${p.productName()}"></td>
            <td th:text="${p.categoryName() ?: '—'}"></td>
            <td th:text="${#numbers.formatDecimal(p.quantitySold(), 1, 'COMMA', 0, 'POINT')}"></td>
            <td th:text="${p.orderCount()}"></td>
            <td th:text="${#numbers.formatDecimal(p.revenue(), 1, 'COMMA', 2, 'POINT')}"></td>
            <td th:text="${#numbers.formatDecimal(p.currentStock(), 1, 'COMMA', 0, 'POINT')}"></td>
        </tr>
        </tbody>
    </table>
    <div class="empty-state" th:if="${products == null or products.isEmpty()}">
        No sales in this period.
    </div>
</section>
</body>
</html>
