<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Login - WhatsAppbotService</title>
    <link rel="stylesheet" th:href="@{/ui/css/app.css}"/>
</head>
<body>
<div class="auth-page">
    <h1>Vendor Login</h1>
    <div class="flash flash--error" th:if="${param.error}">Invalid email or password.</div>
    <div class="flash flash--success" th:if="${param.logout}">You have been logged out.</div>
    <form th:action="@{/ui/login}" method="post">
        <div class="form-group">
            <label for="username">Email</label>
            <input type="email" id="username" name="username" required="required"/>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required="required"/>
        </div>
        <button type="submit" class="btn">Log in</button>
    </form>
    <div class="auth-links">
        <a th:href="@{/ui/register}">Register a new vendor account</a>
    </div>
</div>
</body>
</html>
