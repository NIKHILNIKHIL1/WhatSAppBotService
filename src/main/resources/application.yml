---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB:whatsappbot}
    username: ${POSTGRES_USER:whatsappbot}
    password: ${POSTGRES_PASSWORD:whatsappbot}
  data:
    redis:
      host: redis
      port: 6379

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

logging:
  level:
    root: INFO
    com.bot.whatsappbotservice: INFO
