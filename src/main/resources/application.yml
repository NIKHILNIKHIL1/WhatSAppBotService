spring:
  application:
    name: WhatsAppbotService
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false
  data:
    redis:
      timeout: 1000ms
      connect-timeout: 1000ms

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: ${JWT_SECRET:}
    access-token-expiration-minutes: ${JWT_ACCESS_EXP_MIN:15}
    refresh-token-expiration-days: ${JWT_REFRESH_EXP_DAYS:7}
  encryption:
    key: ${ENCRYPTION_KEY:}
  whatsapp:
    meta:
      graph-api-base-url: ${WHATSAPP_GRAPH_API_BASE_URL:https://graph.facebook.com/v20.0}
      verify-token: ${WHATSAPP_VERIFY_TOKEN:dairy_saas_verify_token}
  twilio:
    api-base-url: ${TWILIO_API_BASE_URL:https://api.twilio.com/2010-04-01}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:false}
    auth:
      requests-per-window: ${RATE_LIMIT_AUTH_REQUESTS:10}
      window-seconds: ${RATE_LIMIT_AUTH_WINDOW_SECONDS:60}
    webhook:
      requests-per-window: ${RATE_LIMIT_WEBHOOK_REQUESTS:60}
      window-seconds: ${RATE_LIMIT_WEBHOOK_WINDOW_SECONDS:60}

