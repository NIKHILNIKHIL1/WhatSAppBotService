services:
  postgres:
    image: postgres:16-alpine
    container_name: whatsappbot-postgres
    environment:
      POSTGRES_DB: whatsappbot
      POSTGRES_USER: whatsappbot
      POSTGRES_PASSWORD: whatsappbot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatsappbot -d whatsappbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: whatsappbot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
